name: CI

on:
  push:
    branches:
      - master
      - main
      - dev
  pull_request:
    branches:
      - master
      - main
      - dev

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linter
        run: pip install pycodestyle

      - name: Validate project
        run: python3 build.py

      - name: Lint code (pycodestyle)
        run: |
          pycodestyle --ignore=E501,W504 *.py utils/*.py deploy/*.py --statistics
